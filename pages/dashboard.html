<!DOCTYPE html>
<html>
  <head>
    <title>Dashboard - Calendar Combiner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-symbols@0.18.0/outlined.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homepage.css">
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <div class="homepage">
      <header class="header">
        <h1 class="title">Calendar Combiner</h1>
        <nav class="dash-nav">
          <span class="dash-user" id="dash-user"></span>
          <button class="login-btn" onclick="logoutUser()">Log out</button>
        </nav>
      </header>

      <div class="dash-wrapper">
        <div class="dash-top-row">
          <h2 class="dash-title">Your sessions</h2>
          <a class="dash-new-link" href="crt-session.html"><button class="session-btn dash-new-btn">+ New session</button></a>
        </div>

        <!-- Created sessions -->
        <section class="dash-section">
          <h3 class="dash-section-title">Created by you</h3>
          <div class="dash-cards" id="created-sessions"></div>
          <p class="dash-empty" id="created-empty" style="display:none;">
            You haven't created any sessions yet.
          </p>
        </section>

        <!-- Joined sessions -->
        <section class="dash-section">
          <h3 class="dash-section-title">Joined</h3>
          <div class="dash-cards" id="joined-sessions"></div>
          <p class="dash-empty" id="joined-empty" style="display:none;">
            You haven't joined any sessions yet.
          </p>
        </section>
      </div>
    </div>

    <script>
      // Dashboard requires a logged-in user — bounce back to homepage otherwise.
      if (localStorage.getItem('cc_logged_in') !== 'true') {
        window.location.href = 'homepage.html';
      }

      const userName = localStorage.getItem('cc_user_name') || 'there';
      document.getElementById('dash-user').textContent = 'Hi, ' + userName;

      function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      function buildSessionCard(id, role, createdAt) {
        const sessionData = JSON.parse(localStorage.getItem('cc_session_' + id) || '{"participants":{}}');
        const participantCount = Object.keys(sessionData.participants).length;

        const card = document.createElement('div');
        card.className = 'dash-card';

        const link = role === 'creator'
          ? `results.html?session=${id}`
          : `crt-session.html?join=${id}`;
        const actionLabel = role === 'creator' ? 'View results' : 'View session';

        card.innerHTML = `
          <div class="dash-card-top">
            <span class="dash-card-id">calendarcombiner.app/s/${id}</span>
            <span class="dash-card-role ${role}">${role === 'creator' ? 'Creator' : 'Participant'}</span>
          </div>
          <p class="dash-card-meta">${participantCount} participant${participantCount === 1 ? '' : 's'} · ${formatDate(createdAt)}</p>
          <a href="${link}"><button class="dash-card-btn">${actionLabel}</button></a>
        `;
        return card;
      }

      function renderDashboard() {
        const email = localStorage.getItem('cc_user_email');
        const mySessions = JSON.parse(localStorage.getItem('cc_my_sessions_' + email) || '{}');
        const createdContainer = document.getElementById('created-sessions');
        const joinedContainer = document.getElementById('joined-sessions');

        let createdCount = 0, joinedCount = 0;

        Object.entries(mySessions).forEach(([id, info]) => {
          const card = buildSessionCard(id, info.role, info.createdAt);
          if (info.role === 'creator') {
            createdContainer.appendChild(card);
            createdCount++;
          } else {
            joinedContainer.appendChild(card);
            joinedCount++;
          }
        });

        document.getElementById('created-empty').style.display = createdCount ? 'none' : 'block';
        document.getElementById('joined-empty').style.display = joinedCount ? 'none' : 'block';
      }

      renderDashboard();
    </script>
    <script src="google-auth.js"></script>
  </body>
</html>
